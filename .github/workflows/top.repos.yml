name: Update Top Repositories
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: # Permite rodar manualmente para testar

permissions:
  contents: write # ESSENCIAL: Dá permissão para a Action fazer o Push

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Versão mais atualizada
        with:
          fetch-depth: 0

      - name: Build Section (Python)
        run: |
          python3 << 'EOF'
          import json, urllib.request

          # Configurado para seu usuário ASTRO-BOT344
          url = 'https://api.github.com/users/ASTRO-BOT344/repos?per_page=100'
          req = urllib.request.Request(url, headers={'User-Agent': 'Python-Script'})
          
          try:
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode())
              
              # Ordena por estrelas e pega os 3 primeiros
              repos = sorted(data, key=lambda r: r.get('stargazers_count', 0), reverse=True)[:3]

              lines = ['<div align="center">', '', '| 📦 Repositório | ⭐ Stars | 🍴 Forks | 🗣️ Linguagem |', '|:---|:---:|:---:|:---:|']

              for r in repos:
                  name  = r.get('name', '')
                  url_r = r.get('html_url', '')
                  stars = r.get('stargazers_count', 0)
                  forks = r.get('forks_count', 0)
                  lang  = r.get('language') or '—'
                  desc  = (r.get('description') or 'Sem descrição')[:60]
                  lines.append(f'| [**{name}**]({url_r}) <br/> <sub>{desc}</sub> | ⭐ {stars} | 🍴 {forks} | `{lang}` |')

              lines.append('', '</div>', '')

              with open('top_repos.md', 'w', encoding='utf-8') as f:
                  f.write('\n'.join(lines))
          except Exception as e:
              print(f"Erro: {e}")
              exit(1)
          EOF

      - name: Replace Section in README
        run: |
          # O AWK vai ler o que o Python gerou e injetar no README entre as tags
          awk '
            // {
              print
              while ((getline line < "top_repos.md") > 0) print line
              close("top_repos.md")
              skip=1
              next
            }
            // {
              skip=0
            }
            !skip { print }
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          # Só faz o commit se houver mudanças reais
          if git diff --quiet && git diff --staged --quiet; then
            echo "Sem mudanças para atualizar."
          else
            git commit -m "Atualizando Top 3 Repos automaticamente 🚀"
            git push
          fi
